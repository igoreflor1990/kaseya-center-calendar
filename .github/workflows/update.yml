name: Update Calendar

on:
  schedule:
    # 08:00 UTC = 4:00 AM ET / 3:00 AM ET (summer) — well before anyone checks the calendar.
    # GitHub cron may run up to 30 min late under load; that's fine for a daily refresh.
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow one-click manual runs from the Actions tab

permissions:
  contents: write  # Needed to push the updated calendar.ics back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate calendar
        run: python scrape.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          # Only commit when calendar.ics actually changed.
          # Note: this commit is also what keeps the repo "active" so GitHub
          # doesn't auto-disable scheduled workflows after 60 days of inactivity.
          # New events are announced frequently enough that real changes occur
          # almost every day; use workflow_dispatch to force a run if needed.
          if git diff --cached --quiet; then
            echo "calendar.ics unchanged — nothing to commit"
          else
            git commit -m "chore: refresh calendar.ics [$(date -u +%Y-%m-%d)]"
            git push
          fi
